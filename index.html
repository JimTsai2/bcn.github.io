<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURNING CLOUD NIGHT</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: linear-gradient(180deg,#1a1a2e,#16213e);
            color: white;
            text-align: center;
        }

        header {
            position: relative;
            padding: 40px 20px 10px 20px;
        }

        h1 {
            font-size: 42px;
            margin: 0 auto 10px auto;
            display: inline-block;
        }

        .lang-select {
            position: absolute;
            top: 18px;
            right: 20px;
            background: #ff944d;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }

        .box {
            background: rgba(255,255,255,0.06);
            padding: 25px;
            border-radius: 12px;
        }

        .main {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .info, .downloads {
            flex: 1;
        }

        .downloads {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .download-list {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 300px;
            gap: 12px;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 12px 18px;
            border-radius: 30px;
            font-weight: bold;
            text-decoration: none;
            background: #3ddc84;
            color: black;
            text-align: center;
        }

        footer {
            margin-top: 30px;
            padding: 20px;
            opacity: 0.8;
            font-size: 14px;
        }

        /* Responsive: stack columns on small screens */
        @media (max-width: 700px) {
            .main {
                flex-direction: column;
            }
            .lang-select {
                top: 12px;
                right: 12px;
            }
            h1 { font-size: 30px; }
        }
    </style>
</head>

<body>

    <header>
        <h1 id="title">BURNING CLOUD NIGHT</h1>

        <!-- 右上角語言選單 -->
        <select id="langSelect" class="lang-select" aria-label="Language selector">
            <option value="en">EN</option>
            <option value="zh-hant">繁</option>
            <option value="zh-hans">简</option>
            <option value="vi">VI</option>
            <option value="ja">JP</option>
        </select>
    </header>

    <div class="container">

        <!-- 左半邊：遊戲介紹； 右半邊：下載按鈕 -->
        <div class="main">
            <div class="info box">
                <p id="description"></p>
            </div>

            <div class="downloads box">
                <div class="download-list">
                    <a href="#" class="download-btn">Android</a>
                    <a href="#" class="download-btn">iOS</a>
                    <a href="#" class="download-btn">Windows</a>
                    <a href="#" class="download-btn">Web</a>
                </div>
            </div>
        </div>

        <!-- 底下：更新日誌 -->
        <div class="box" style="margin-top:20px;">
            <h2>Release Notes</h2>
            <p id="release" style="white-space: pre-wrap; text-align: left;"></p>
        </div>

    </div>

    <footer id="studio"></footer>

    <script>
        const data = {
            "en":{
                title:"BURNING CLOUD NIGHT",
                description:`BURNING CLOUD NIGHT (BCN) is a fan-made collection based on Dancing Line by Fire Cloud Studio.
Go through each level to explore the charm of the game.
We will continue to produce and include more high-quality fan-made levels.`,
                release:`1.4.1
1. Fixed an issue where the player would die immediately after revival
2. Added anti-aliasing
3. Updated the UI
4. Fixed an auto-login error`,
                studio:"© Fire Cloud Studio"
            },

            "zh-hant":{
                title:"火燒雲之夜 BURNING CLOUD NIGHT",
                description:`BURNING CLOUD NIGHT (簡稱BCN) 是Fire Cloud Studio火雲工作室以跳舞的線Dancing Line為藍本所做的飯制合集。
闖向各個關卡探索遊戲的魅力，我們將持續製作以及收錄更多優質飯製關卡作品。`,
                release:`1.4.1
1. 修正復活後瞬間死亡的問題
2. 加入反鋸齒
3. 修改UI介面
4. 修復自動登入錯誤`,
                studio:"© 火雲工作室"
            },

            "zh-hans":{
                title:"火烧云之夜 BURNING CLOUD NIGHT",
                description:`BURNING CLOUD NIGHT (BCN) 是Fire Cloud Studio火云工作室以跳舞的线Dancing Line为蓝本所做的饭制合集。
闯向各个关卡探索游戏的魅力，我们将持续制作以及收录更多优质饭制关卡作品。`,
                release:`1.4.1
1. 修复复活后瞬间死亡的问题
2. 加入抗锯齿
3. 更新UI界面
4. 修复自动登录错误`,
                studio:"© 火云工作室"
            },

            "vi":{
                title:"BURNING CLOUD NIGHT",
                description:`BURNING CLOUD NIGHT (BCN) là một tựa game Dancing Line Fanmade của Fire Cloud Studio.
Hãy vượt qua từng màn chơi để khám phá sức hấp dẫn của trò chơi.
Chúng tôi sẽ tiếp tục tạo và bổ sung thêm nhiều màn chơi fanmade chất lượng cao.`,
                release:`1.4.1
1. Sửa lỗi mà người chơi chết lập tức sau khi hồi sinh
2. Đã thêm tính năng Khử răng cưa
3. Đã cập nhật giao diện
4. Đã sửa lỗi tự動 đăng nhập`,
                studio:"© Fire Cloud Studio"
            },

            "ja":{
                title:"火焼雲の夜 BURNING CLOUD NIGHT",
                description:`火焼雲の夜(BURNING CLOUD NIGHT) は、Dancing Line をベースにした 火雲スタジオによるファンメイドのコレクションです。
各レベルをクリアして、ゲームの魅力を探求してください。
今後も、より高品質なファンメイドレベルを制作し、収録していきます。`,
                release:`1.4.1
1. 復活後に即死してしまう問題を修正
2. アンチエイリアスを追加
3. UIを更新
4. 自動ログインの不具合を修正`,
                studio:"© 火雲スタジオ"
            }
        };

        function setLang(lang){
            const item = data[lang] || data["en"];
            document.getElementById("title").innerText = item.title;
            document.title = item.title;
            document.getElementById("description").innerText = item.description;
            document.getElementById("release").innerText = item.release;
            document.getElementById("studio").innerText = item.studio;

            // 更新選單值（如果使用者透過其他方式切換）
            const sel = document.getElementById("langSelect");
            if(sel.value !== lang) sel.value = lang;
        }

        // 當選單變更時切換語言
        document.getElementById("langSelect").addEventListener("change", (e) => {
            setLang(e.target.value);
        });

        // 初始語言
        setLang("en");
    </script>

</body>
</html>
