<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURNING CLOUD NIGHT</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: #000000;
            color: white;
            text-align: center;
        }

        header {
            position: relative;
            padding: 40px 20px 10px 20px;
        }

        h1 {
            font-size: 42px;
            margin: 0 auto 10px auto;
            display: inline-block;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .downloads-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .downloads-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .download-list {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 300px;
            gap: 12px;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 12px 18px;
            border-radius: 30px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: opacity 0.3s;
        }

        .download-btn:hover {
            opacity: 0.9;
        }

        .btn-android {
            background: #3ddc84;
            color: black;
        }

        .btn-ios {
            background: #555555;
        }

        .btn-windows {
            background: #0078d4;
        }

        .btn-web {
            background: #ff9800;
        }

        .btn-harmonyos {
            background: #da291c;
        }

        .btn-uwp {
            background: #0078d4;
        }

        footer {
            margin-top: 30px;
            padding: 20px;
            opacity: 0.8;
            font-size: 14px;
        }

        /* Responsive: stack columns on small screens */
        @media (max-width: 700px) {
            .lang-select {
                top: 12px;
                right: 12px;
            }
            h1 { font-size: 30px; }
        }
    </style>
</head>

<body>

    <header>
        <h1 id="title">BURNING CLOUD NIGHT</h1>
    </header>

    <div class="container">

        <!-- 下載按鈕 -->
        <div class="box downloads-section">
            <div class="downloads-title" id="downloadsTitle">Download</div>
            <div class="download-list">
                <a href="#" class="download-btn btn-android">Android</a>
                <a href="https://testflight.apple.com/join/AewCypAu" class="download-btn btn-ios">iOS</a>
                <a href="#" class="download-btn btn-windows">Windows</a>
                <a href="https://play.unity.com/en/games/39600486-a3a6-4bbc-a43e-9e44efab66ef/burning-cloud-night" class="download-btn btn-web">WebGL</a>
                <a href="#" class="download-btn btn-harmonyos">HarmonyOS NEXT</a>
                <a href="https://apps.microsoft.com/detail/9NNNWCFMQCXG" class="download-btn btn-uwp">Microsoft Store (UWP)</a>
            </div>
        </div>

    </div>


</body>
</html>
